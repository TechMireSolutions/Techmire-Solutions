name: Techmire Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v5

    - name: Executing Remote SSH Commands for Build and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # 1. Project folder mein jayein
          cd /www/wwwroot/techmiresolutions.com
          
          # 2. Hard pull karein taake agar server par koi file conflict ho toh solve ho jaye
          git fetch --all
          git reset --hard origin/main
          
          # 3. Server par env files restore karein (git inko ignore karta hai)
          if [ ! -f .env.local ]; then
            echo "WARNING: .env.local not found on server!"
          fi
          
          # 4. Purana build saaf karein taake stale chunks na rahein
          rm -rf .next .cache
          
          # 5. Fresh dependencies install karein
          npm install
          
          # 6. Build karein — agar build fail ho toh deploy roko
          npm run build || { echo "BUILD FAILED"; exit 1; }
          
          # 7. Global PATH set karke aaPanel ke asal PM2 ko reload/restart karein
          export PATH=$PATH:/usr/local/bin:/usr/bin
          
          # 8. Purane process ko kill karke fresh start karein
          pm2 delete techmire-frontend || npx pm2 delete techmire-frontend || true
          
          # 9. PM2 par start karein
          PORT=3001 pm2 start node_modules/next/dist/bin/next --name "techmire-frontend" -- start --port 3001 || PORT=3001 npx pm2 start node_modules/next/dist/bin/next --name "techmire-frontend" -- start --port 3001
          
          # 10. State save karein taake server reboot par automatic chalu rahe
          pm2 save || npx pm2 save
          
          # 11. Verify karein ki build sahi hai
          ls -la .next/static/chunks/ | head -5