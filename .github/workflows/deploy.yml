name: Techmire Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v5

    - name: Executing Remote SSH Commands for Build and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e
          
          # 1. Project folder mein jayein
          cd /www/wwwroot/techmiresolutions.com
          
          # 2. Hard pull karein
          git fetch --all
          git reset --hard origin/main
          
          # 3. Check env file aur SMTP_FROM fix karein (angle brackets env parser todte hain)
          if [ ! -f .env.local ]; then
            echo "ERROR: .env.local not found on server!"
            exit 1
          fi
          sed -i 's|^SMTP_FROM=Techmire Solutions <connect@techmiresolutions.com>$|SMTP_FROM="Techmire Solutions <connect@techmiresolutions.com>"|' .env.local
          
          # 4. Purana build saaf karein
          rm -rf .next .cache
          
          # 5. Fresh dependencies install
          npm install
          
          # 6. Sirf next build karein (next-sitemap ko skip karein taake env error na aaye)
          npx next build
          
          # 7. Verify karein ki chunks bane hain
          if [ ! -d ".next/static/chunks" ]; then
            echo "ERROR: Build incomplete — .next/static/chunks missing!"
            exit 1
          fi
          echo "Build verified: chunks exist"
          ls .next/static/chunks/ | head -5
          
          # 8. Global PATH
          export PATH=$PATH:/usr/local/bin:/usr/bin
          
          # 9. Purane process ko kill karke fresh start
          pm2 delete techmire-frontend || npx pm2 delete techmire-frontend || true
          
          # 10. PM2 par start
          PORT=3001 pm2 start node_modules/next/dist/bin/next --name "techmire-frontend" -- start --port 3001
          
          # 11. State save
          pm2 save || npx pm2 save