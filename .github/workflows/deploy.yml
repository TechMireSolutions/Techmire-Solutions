name: Techmire Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Executing Remote SSH Commands for Build and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }} # <-- Key ki jagah direct password check
        port: 22 # <-- Isko strictly 22 (ya aapka asli SSH terminal port) rakhein
        script: |
          cd /www/wwwroot/techmiresolutions.com
          git pull origin main
          npm install
          npm run build
          npx pm2 delete techmire-frontend || true
          PORT=3001 npx pm2 start node_modules/next/dist/bin/next --name "techmire-frontend" -- start -p 3001
          npx pm2 save